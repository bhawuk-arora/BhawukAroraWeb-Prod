name: CI/CD Pipeline

on:
  push:
    branches:
      - dev

jobs:
  build-and-promote:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for merging

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Build
        run: npm run build
        env:
          # In Next.js, build needs Clerk env vars to compile pages, or we can use placeholder keys
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder

      - name: Merge dev into master
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Checkout master branch
          git checkout master
          
          # Merge dev into master
          git merge origin/dev --no-ff -m "chore: auto-merge dev to master after successful build"
          
          # Push changes to master
          git push origin master
